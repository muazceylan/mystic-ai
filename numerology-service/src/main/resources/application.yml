server:
  port: 8085

spring:
  application:
    name: numerology-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:mystic_numerology}
    username: ${DB_USER:mystic}
    password: ${DB_PASSWORD:mystic123}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  task:
    scheduling:
      pool:
        size: 2

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    ip-address: ${EUREKA_INSTANCE_IP:127.0.0.1}
    instance-id: ${spring.application.name}:${random.uuid}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

logging:
  level:
    com.mysticai.numerology: DEBUG
    org.flywaydb: INFO

numerology:
  premium-enabled: ${NUMEROLOGY_PREMIUM_ENABLED:false}

services:
  ai-orchestrator:
    base-url: ${AI_ORCHESTRATOR_URL:http://localhost:8084}
    guidance-timeout-ms: 5000

name-ingestion:
  enabled: true
  schedule-cron: "0 20 3 * * *"
  respect-robots-txt: true
  source-run-timeout-seconds: 3600
  lock-stale-seconds: 900
  lock-heartbeat-interval-seconds: 10
  http:
    connect-timeout-ms: 8000
    read-timeout-ms: 15000
    max-retries: 2
    retry-backoff-ms: 800
    user-agent: "MysticAI-NameIngestionBot/1.0 (+contact: ops@mysticai.local)"
  sources:
    bebekismi:
      enabled: true
      rate-limit-ms: 650
      max-discovery-urls: 5000
      max-fetch-urls-per-run: 5000
    sfk_istanbul_edu:
      enabled: true
      rate-limit-ms: 850
      max-discovery-urls: 5000
      max-fetch-urls-per-run: 5000
    alfabetik:
      enabled: true
      rate-limit-ms: 500
      max-discovery-urls: 6000
      max-fetch-urls-per-run: 6000
    ufuk:
      enabled: true
      rate-limit-ms: 850
      max-discovery-urls: 5000
      max-fetch-urls-per-run: 5000
