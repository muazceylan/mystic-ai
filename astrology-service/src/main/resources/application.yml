server:
  port: 8083

spring:
  application:
    name: astrology-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:mystic_astrology}
    username: ${DB_USER:mystic}
    password: ${DB_PASSWORD:mystic123}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:validate}
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:mystic}
    password: ${RABBITMQ_PASSWORD:mystic123}
    virtual-host: ${RABBITMQ_VHOST:mystic}

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:mystic123}

  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 26MB

  task:
    scheduling:
      pool:
        size: 4

  jackson:
    serialization:
      write-dates-as-timestamps: false

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    ip-address: ${EUREKA_INSTANCE_IP:127.0.0.1}
    instance-id: ${spring.application.name}:${random.uuid}

management:
  endpoints:
    web:
      exposure:
        include: health,info

groq:
  api-key: ${GROQ_API_KEY}
  base-url: ${GROQ_BASE_URL:https://api.groq.com/openai}

ai-orchestrator:
  url: ${AI_ORCHESTRATOR_URL:http://localhost:8084}

api-ninjas:
  api-key: ${API_NINJAS_KEY:}

logging:
  level:
    com.mysticai.astrology: DEBUG

internal:
  gateway:
    key: ${INTERNAL_GATEWAY_KEY:local-dev-internal-gateway-key-change-me}
