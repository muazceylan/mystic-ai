# ===========================================
# Mystic AI - Docker Infrastructure
# ===========================================

services:
  # ==========================================
  # PostgreSQL - Main Database Server
  # ==========================================
  postgres:
    image: pgvector/pgvector:pg16
    container_name: mystic-postgres
    environment:
      POSTGRES_USER: mystic
      POSTGRES_PASSWORD: mystic123
      POSTGRES_MULTIPLE_DATABASES: mystic_auth,mystic_tarot,mystic_astrology,mystic_numerology,mystic_dream,mystic_oracle,mystic_notification,mystic_vision
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init-multiple-dbs.sh:/docker-entrypoint-initdb.d/01-init-dbs.sh:ro
      - ./docker/postgres/init-schemas.sql:/docker-entrypoint-initdb.d/02-init-schemas.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mystic"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mystic-network
    restart: unless-stopped

  # ==========================================
  # RabbitMQ - Message Broker
  # ==========================================
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: mystic-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: mystic
      RABBITMQ_DEFAULT_PASS: mystic123
      RABBITMQ_DEFAULT_VHOST: mystic
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./docker/rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mystic-network
    restart: unless-stopped

  # ==========================================
  # Redis - Caching & Session Store
  # ==========================================
  redis:
    image: redis:7-alpine
    container_name: mystic-redis
    command: >
      redis-server
      --appendonly yes
      --requirepass mystic123
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "mystic123", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mystic-network
    restart: unless-stopped

  # ==========================================
  # pgAdmin - Database Management UI
  # ==========================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: mystic-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@mysticai.com
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./docker/pgadmin/servers.json:/pgadmin4/servers.json:ro
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - mystic-network
    profiles:
      - tools
    restart: unless-stopped

  # ==========================================
  # Redis Commander - Redis UI
  # ==========================================
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: mystic-redis-ui
    environment:
      REDIS_HOSTS: local:redis:6379:0:mystic123
    ports:
      - "8085:8081"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - mystic-network
    profiles:
      - tools
    restart: unless-stopped

  # ==========================================
  # Prometheus - Metrics Collection
  # ==========================================
  prometheus:
    image: prom/prometheus:latest
    container_name: mystic-prometheus
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - mystic-network
    profiles:
      - monitoring
    restart: unless-stopped

  # ==========================================
  # Grafana - Metrics Visualization
  # ==========================================
  grafana:
    image: grafana/grafana:latest
    container_name: mystic-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin123
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - mystic-network
    profiles:
      - monitoring
    restart: unless-stopped

  # ==========================================
  # Zipkin - Distributed Tracing
  # ==========================================
  zipkin:
    image: openzipkin/zipkin:latest
    container_name: mystic-zipkin
    environment:
      STORAGE_TYPE: mem
    ports:
      - "9411:9411"
    networks:
      - mystic-network
    profiles:
      - monitoring
    restart: unless-stopped

volumes:
  postgres_data:
    name: mystic-postgres-data
  rabbitmq_data:
    name: mystic-rabbitmq-data
  redis_data:
    name: mystic-redis-data
  pgadmin_data:
    name: mystic-pgadmin-data
  prometheus_data:
    name: mystic-prometheus-data
  grafana_data:
    name: mystic-grafana-data

networks:
  mystic-network:
    name: mystic-network
    driver: bridge
