# ===========================================
# Mystic AI - Docker Infrastructure
# ===========================================

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: mystic-postgres
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_MULTIPLE_DATABASES: mystic_auth,mystic_tarot,mystic_astrology,mystic_numerology,mystic_dream,mystic_oracle,mystic_notification,mystic_vision,mystic_spiritual
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init-multiple-dbs.sh:/docker-entrypoint-initdb.d/01-init-dbs.sh:ro
      - ./docker/postgres/init-schemas.sql:/docker-entrypoint-initdb.d/02-init-schemas.sql:ro
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mystic-network
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: mystic-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./docker/rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
    ports:
      - "127.0.0.1:5672:5672"
      - "127.0.0.1:15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mystic-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: mystic-redis
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$REDIS_PASSWORD\" ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mystic-network
    restart: unless-stopped

  mailhog:
    image: mailhog/mailhog:latest
    container_name: mystic-mailhog
    ports:
      - "127.0.0.1:1025:1025"
      - "127.0.0.1:8025:8025"
    networks:
      - mystic-network
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: mystic-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: adminMC
      PGADMIN_DEFAULT_PASSWORD: AstroGuru.32
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./docker/pgadmin/servers.json:/pgadmin4/servers.json:ro
    ports:
      - "127.0.0.1:5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - mystic-network
    profiles:
      - tools
    restart: unless-stopped

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: mystic-redis-ui
    environment:
      REDIS_HOSTS: local:redis:6379:0:${REDIS_PASSWORD}
    ports:
      - "127.0.0.1:8085:8081"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - mystic-network
    profiles:
      - tools
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: mystic-prometheus
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    networks:
      - mystic-network
    profiles:
      - monitoring
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: mystic-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: AstroGuru.32
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - prometheus
    networks:
      - mystic-network
    profiles:
      - monitoring
    restart: unless-stopped

  zipkin:
    image: openzipkin/zipkin:latest
    container_name: mystic-zipkin
    environment:
      STORAGE_TYPE: mem
    ports:
      - "127.0.0.1:9411:9411"
    networks:
      - mystic-network
    profiles:
      - monitoring
    restart: unless-stopped

  spiritual-service:
    build:
      context: ./spiritual-service
      dockerfile: Dockerfile
    container_name: mystic-spiritual-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/mystic_spiritual
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PASSWORD: ${REDIS_PASSWORD}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      GROQ_API_KEY: ${GROQ_API_KEY:-}
    ports:
      - "127.0.0.1:8091:8091"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - mystic-network
    restart: unless-stopped

volumes:
  postgres_data:
    name: mystic-postgres-data
  rabbitmq_data:
    name: mystic-rabbitmq-data
  redis_data:
    name: mystic-redis-data
  pgadmin_data:
    name: mystic-pgadmin-data
  prometheus_data:
    name: mystic-prometheus-data
  grafana_data:
    name: mystic-grafana-data

networks:
  mystic-network:
    name: mystic-network
    driver: bridge