server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        # Admin panel API — routes to notification-service which owns all admin logic
        - id: admin-api
          uri: lb://notification-service
          predicates:
            - Path=/api/admin/v1/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 30
                redis-rate-limiter.burstCapacity: 60
                redis-rate-limiter.requestedTokens: 1

        # App Config — public endpoint on notification-service
        - id: app-config
          uri: lb://notification-service
          predicates:
            - Path=/api/v1/app-config

        # Tutorial Config — public endpoint on notification-service
        - id: tutorial-configs
          uri: lb://notification-service
          predicates:
            - Path=/api/v1/tutorial-configs,/api/v1/tutorial-configs/**

        # CMS Content — public horoscope/prayer endpoints on notification-service
        - id: cms-content
          uri: lb://notification-service
          predicates:
            - Path=/api/v1/content/**

        # Notification service — user-facing notification endpoints
        - id: notifications
          uri: lb://notification-service
          predicates:
            - Path=/api/v1/notifications/**

        # Notification WebSocket
        - id: notifications-ws
          uri: lb:ws://notification-service
          predicates:
            - Path=/ws/**

      # Remove duplicate CORS headers added by both gateway and backend services
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE

      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      # HTTP Client configuration for WebSocket support
      httpclient:
        connect-timeout: 5000
        # Planner full-distribution requests can exceed 60s on first computation/cache warmup.
        response-timeout: 180s
        pool:
          type: elastic
          max-connections: 1000
          max-life-time: 20m
          eviction-interval: 10s

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:mystic123}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    ip-address: ${EUREKA_INSTANCE_IP:127.0.0.1}

jwt:
  secret: ${JWT_SECRET:bXlzdGljLWFpLXNlY3JldC1rZXktZm9yLWp3dC10b2tlbi1nZW5lcmF0aW9uLW11c3QtYmUtYXQtbGVhc3QtMjU2LWJpdHM=}

gateway:
  auth:
    permit-all: false
  internal:
    key: ${INTERNAL_GATEWAY_KEY:local-dev-internal-gateway-key-change-me}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001,http://localhost:8090,http://localhost:8500,http://localhost:19000,http://127.0.0.1:3000,http://127.0.0.1:3001,http://127.0.0.1:8090,http://127.0.0.1:8500,http://127.0.0.1:19000}
    allow-credentials: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    gateway:
      enabled: true
    health:
      show-details: always

# SpringDoc OpenAPI Configuration
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    config-url: /v3/api-docs/swagger-config
    url: /v3/api-docs
    display-request-duration: true
    operations-sorter: method
    tags-sorter: alpha
    doc-expansion: none

logging:
  level:
    org.springframework.cloud.gateway: INFO
