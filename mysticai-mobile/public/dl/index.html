<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Mystic AI | İndir</title>
    <meta name="description" content="Mystic AI uygulamasını indirin." />
    <style>
      :root {
        --bg-a: #24114f;
        --bg-b: #07152f;
        --card: rgba(255, 255, 255, 0.1);
        --line: rgba(255, 255, 255, 0.15);
        --text: #f8fafc;
        --muted: #cbd5e1;
        --cta: #c4b5fd;
        --cta-text: #24114f;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at 20% 15%, rgba(168,85,247,.25), transparent 45%),
          radial-gradient(circle at 80% 80%, rgba(96,165,250,.18), transparent 42%),
          linear-gradient(145deg, var(--bg-a), #111d5d 52%, var(--bg-b));
        color: var(--text);
        padding: 24px;
      }
      .card {
        width: min(520px, 100%);
        border: 1px solid var(--line);
        background: var(--card);
        border-radius: 20px;
        backdrop-filter: blur(16px);
        padding: 22px;
        box-shadow: 0 20px 40px rgba(2, 6, 23, 0.35);
      }
      .eyebrow {
        font-size: 12px;
        letter-spacing: .18em;
        color: #ddd6fe;
        font-weight: 700;
      }
      h1 {
        margin: 10px 0 6px;
        font-size: 28px;
        line-height: 1.15;
      }
      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.55;
      }
      .status {
        margin-top: 16px;
        padding: 12px 14px;
        border-radius: 14px;
        border: 1px solid var(--line);
        background: rgba(255,255,255,0.04);
        font-size: 14px;
      }
      .actions {
        margin-top: 16px;
        display: grid;
        gap: 10px;
      }
      a.btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 46px;
        border-radius: 12px;
        text-decoration: none;
        font-weight: 700;
        border: 1px solid transparent;
      }
      a.btn.primary {
        background: var(--cta);
        color: var(--cta-text);
      }
      a.btn.secondary {
        background: rgba(255,255,255,0.05);
        color: var(--text);
        border-color: var(--line);
      }
      .small {
        margin-top: 12px;
        font-size: 12px;
        color: rgba(226,232,240,.8);
      }
      @media (prefers-reduced-motion: no-preference) {
        .pulse {
          animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse {
          0%, 100% { transform: scale(1); }
          50% { transform: scale(1.015); }
        }
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="eyebrow">MYSTIC AI</div>
      <h1 id="title">Uygulamaya yönlendiriliyorsunuz…</h1>
      <p id="copy">Cihazınıza uygun mağazaya birkaç saniye içinde otomatik yönlendirme yapılacak.</p>
      <div class="status" id="status">Hazırlanıyor…</div>
      <div class="actions">
        <a id="primaryCta" class="btn primary pulse" href="#">Devam Et</a>
        <a id="secondaryCta" class="btn secondary" href="#">Diğer Platform</a>
      </div>
      <div class="small" id="footnote">Yönlendirme çalışmazsa yukarıdaki butonlardan mağazayı manuel açabilirsiniz.</div>
    </main>

    <script>
      (function () {
        // Replace with your final production links before launch.
        var IOS_URL = 'https://apps.apple.com/app/mystic-ai/id0000000000';
        var ANDROID_URL = 'https://play.google.com/store/apps/details?id=com.mysticai.app';
        var FALLBACK_WEB_URL = 'https://astroguru.app';

        var params = new URLSearchParams(window.location.search);
        var iosOverride = params.get('ios');
        var androidOverride = params.get('android');
        var webOverride = params.get('web');
        if (iosOverride) IOS_URL = iosOverride;
        if (androidOverride) ANDROID_URL = androidOverride;
        if (webOverride) FALLBACK_WEB_URL = webOverride;

        var locale = ((navigator.language || 'tr').toLowerCase().startsWith('tr')) ? 'tr' : 'en';
        document.documentElement.lang = locale;

        var ua = navigator.userAgent || navigator.vendor || window.opera || '';
        var isAndroid = /android/i.test(ua);
        var isIOS = /iPad|iPhone|iPod/.test(ua) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

        var target = isIOS ? IOS_URL : isAndroid ? ANDROID_URL : FALLBACK_WEB_URL;
        var alt = isIOS ? ANDROID_URL : ANDROID_URL === target ? IOS_URL : ANDROID_URL;

        function appendTracking(url) {
          try {
            var u = new URL(url);
            var incoming = new URLSearchParams(window.location.search);
            ['utm_source', 'utm_medium', 'utm_campaign', 'utm_content', 'utm_term', 'ref'].forEach(function (key) {
              var value = incoming.get(key);
              if (value && !u.searchParams.get(key)) u.searchParams.set(key, value);
            });
            return u.toString();
          } catch (_e) {
            return url;
          }
        }

        target = appendTracking(target);
        alt = appendTracking(alt);

        var statusEl = document.getElementById('status');
        var copyEl = document.getElementById('copy');
        var titleEl = document.getElementById('title');
        var footnoteEl = document.getElementById('footnote');
        var primary = document.getElementById('primaryCta');
        var secondary = document.getElementById('secondaryCta');

        if (primary) primary.href = target;
        if (secondary) secondary.href = alt;

        var copy = {
          tr: {
            title: 'Uygulamaya yönlendiriliyorsunuz…',
            preparing: 'Hazırlanıyor…',
            iosStatus: 'iPhone / iPad algılandı. App Store açılıyor…',
            iosCopy: 'Mystic AI uygulamasını App Store üzerinden yükleyebilirsiniz.',
            iosPrimary: 'App Store\'u Aç',
            androidStatus: 'Android cihaz algılandı. Google Play açılıyor…',
            androidCopy: 'Mystic AI uygulamasını Google Play üzerinden yükleyebilirsiniz.',
            androidPrimary: 'Google Play\'i Aç',
            desktopStatus: 'Masaüstü / bilinmeyen cihaz. İndirme sayfası açılıyor…',
            desktopCopy: 'İsterseniz mobil cihazınızdan bu sayfayı açarak doğrudan mağaza yönlendirmesi alabilirsiniz.',
            desktopPrimary: 'Mystic AI Sitesini Aç',
            appStore: 'App Store',
            playStore: 'Google Play',
            footnote: 'Yönlendirme çalışmazsa yukarıdaki butonlardan mağazayı manuel açabilirsiniz.'
          },
          en: {
            title: 'Redirecting you to the app…',
            preparing: 'Preparing…',
            iosStatus: 'iPhone / iPad detected. Opening the App Store…',
            iosCopy: 'You can install Mystic AI from the App Store.',
            iosPrimary: 'Open App Store',
            androidStatus: 'Android device detected. Opening Google Play…',
            androidCopy: 'You can install Mystic AI from Google Play.',
            androidPrimary: 'Open Google Play',
            desktopStatus: 'Desktop / unknown device detected. Opening the download page…',
            desktopCopy: 'Open this page on your mobile device to get redirected directly to the correct store.',
            desktopPrimary: 'Open Mystic AI Website',
            appStore: 'App Store',
            playStore: 'Google Play',
            footnote: 'If the redirect does not work, use the buttons above to open the store manually.'
          }
        }[locale];

        if (titleEl) titleEl.textContent = copy.title;
        if (statusEl) statusEl.textContent = copy.preparing;
        if (footnoteEl) footnoteEl.textContent = copy.footnote;

        if (isIOS) {
          statusEl.textContent = copy.iosStatus;
          copyEl.textContent = copy.iosCopy;
          primary.textContent = copy.iosPrimary;
          secondary.textContent = copy.playStore;
        } else if (isAndroid) {
          statusEl.textContent = copy.androidStatus;
          copyEl.textContent = copy.androidCopy;
          primary.textContent = copy.androidPrimary;
          secondary.textContent = copy.appStore;
        } else {
          statusEl.textContent = copy.desktopStatus;
          copyEl.textContent = copy.desktopCopy;
          primary.textContent = copy.desktopPrimary;
          secondary.textContent = copy.playStore;
        }

        setTimeout(function () {
          window.location.replace(target);
        }, 450);
      })();
    </script>
  </body>
</html>
