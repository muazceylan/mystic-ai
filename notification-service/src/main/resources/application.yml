server:
  port: 8088

spring:
  application:
    name: notification-service

  # Database Configuration
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/mystic_notification
    username: ${DB_USER:mystic}
    password: ${DB_PASSWORD:mystic123}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000

  # JPA Configuration
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:validate}
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        # Suppress DDL warnings for CHECK constraints on existing tables
        hbm2ddl:
          halt_on_error: false

  # RabbitMQ Configuration
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:mystic}
    password: ${RABBITMQ_PASSWORD:mystic123}
    virtual-host: ${RABBITMQ_VHOST:mystic}
    listener:
      simple:
        concurrency: 3
        max-concurrency: 10
        default-requeue-rejected: false

  # Email (SMTP) — for admin temp password delivery
  mail:
    host: ${SMTP_HOST:smtp.gmail.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

  # WebSocket Configuration
  websocket:
    stomp:
      relay:
        enabled: false

# Eureka Client Configuration
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    ip-address: ${EUREKA_INSTANCE_IP:127.0.0.1}
    instance-id: ${spring.application.name}:${spring.application.instance_id:${random.value}}
    lease-renewal-interval-in-seconds: 30
    lease-expiration-duration-in-seconds: 90

# Management / Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  health:
    rabbitmq:
      enabled: true
    db:
      enabled: true
    mail:
      enabled: false

# Logging
logging:
  level:
    com.mysticai.notification: INFO
    org.springframework.web.socket: DEBUG
    org.springframework.messaging: DEBUG
    org.springframework.amqp: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] [%X{traceId:-},%X{spanId:-}] %-5level %logger{36} - %msg%n"

# Custom Properties
notification:
  testing:
    endpoints-enabled: ${NOTIFICATION_TEST_ENDPOINTS_ENABLED:false}
  websocket:
    endpoint: /ws
    allowed-origins: "*"
    user-destination-prefix: /user
    application-destination-prefix: /app
    topic-prefix: /topic

internal:
  gateway:
    key: ${INTERNAL_GATEWAY_KEY:local-dev-internal-gateway-key-change-me}

# Expo Push Notifications
expo:
  push:
    url: ${EXPO_PUSH_URL:https://exp.host/--/api/v2/push/send}
    enabled: ${EXPO_PUSH_ENABLED:true}

# Admin Panel Configuration
# IMPORTANT: Override admin.jwt.secret with a strong random value in production (min 32 chars).
admin:
  jwt:
    secret: ${ADMIN_JWT_SECRET:mystic-admin-dev-secret-key-change-in-prod-32+}
    expiration-ms: ${ADMIN_JWT_EXPIRATION_MS:86400000}
  email:
    enabled: ${ADMIN_EMAIL_ENABLED:false}
    from: ${ADMIN_EMAIL_FROM:noreply@mysticai.com}

# Scheduled Admin Notification Dispatch
scheduled:
  admin-notification:
    interval-ms: ${ADMIN_NOTIF_DISPATCH_INTERVAL_MS:60000}  # 60s default

# Internal service URLs (for CMS ingest)
services:
  astrology:
    base-url: ${ASTROLOGY_SERVICE_URL:http://localhost:8083}
  auth:
    base-url: ${AUTH_SERVICE_URL:http://localhost:8081}

# ── User JWT Configuration ────────────────────────────────────────────────────
# WHY: UserJwtFilter validates user Bearer tokens for rewarded-ads endpoints,
# independently of the gateway. Uses the SAME secret as auth-service (JWT_SECRET).
# This closes the trust gap for direct (non-gateway) calls to notification-service.
user:
  jwt:
    secret: ${JWT_SECRET:bXlzdGljLWFpLXNlY3JldC1rZXktZm9yLWp3dC10b2tlbi1nZW5lcmF0aW9uLW11c3QtYmUtYXQtbGVhc3QtMjU2LWJpdHM=}

# ── Rewarded Ads Configuration ────────────────────────────────────────────────
# All amounts in Guru Tokens. Adjust per-environment in application-prod.yml.
rewarded-ads:
  enabled: ${REWARDED_ADS_ENABLED:true}
  # Per-session reward (source of truth — frontend never sets this).
  default-reward-amount: ${REWARDED_ADS_DEFAULT_AMOUNT:5}
  # GAM ad unit path: /networkCode/adUnitPath
  ad-unit-path: ${REWARDED_ADS_AD_UNIT_PATH:/12345/mysticai/rewarded_earn}
  # Analytics/grouping key for the earn page placement.
  placement-key: ${REWARDED_ADS_PLACEMENT_KEY:web_earn_page}
  # Intent TTL in seconds (user has this long to watch the ad after clicking CTA).
  intent-ttl-seconds: ${REWARDED_ADS_INTENT_TTL_SECONDS:300}
  # Max claimed intents per user per calendar day (UTC).
  daily-limit: ${REWARDED_ADS_DAILY_LIMIT:10}
  # Max claimed intents per user in the last 60 minutes.
  hourly-limit: ${REWARDED_ADS_HOURLY_LIMIT:3}
  # Minimum seconds between consecutive claim grants.
  cooldown-seconds: ${REWARDED_ADS_COOLDOWN_SECONDS:60}
  # Max simultaneous PENDING/AD_READY intents per user (prevents tab-farming).
  max-parallel-pending-intents: ${REWARDED_ADS_MAX_PARALLEL:1}
  # Cleanup scheduler interval in ms.
  cleanup-interval-ms: ${REWARDED_ADS_CLEANUP_INTERVAL_MS:120000}
  # ── CSP / Origin / Allowlist ─────────────────────────────────────────────
  # Allowed Origin header values for claim requests. Empty = no enforcement.
  # Example: ["https://mysticai.com", "https://www.mysticai.com"]
  allowed-origins: ${REWARDED_ADS_ALLOWED_ORIGINS:}
  # Allowed placement keys. Empty = any placement accepted (dev-safe default).
  allowed-placements: ${REWARDED_ADS_ALLOWED_PLACEMENTS:web_earn_page}
  # Allowed GAM ad unit paths. Server always uses its own adUnitPath config;
  # this list governs allowlist logging/blocking only.
  allowed-ad-unit-paths: ${REWARDED_ADS_ALLOWED_AD_UNIT_PATHS:}
  # When true, origin mismatch → HTTP 400. When false → warn log only.
  enforce-origin-check: ${REWARDED_ADS_ENFORCE_ORIGIN:false}

analytics:
  ga4:
    # Use a dedicated GA4 web stream for aggregate server-side exports.
    enabled: ${GA4_EXPORT_ENABLED:false}
    endpoint: ${GA4_EXPORT_ENDPOINT:https://www.google-analytics.com/mp/collect}
    measurement-id: ${GA4_MEASUREMENT_ID:}
    api-secret: ${GA4_API_SECRET:}
    client-id: ${GA4_CLIENT_ID:mystic-admin-server}

# Gateway Integration Note:
# Add the following predicate to api-gateway routes configuration to expose admin API:
#
#   - id: admin-service
#     uri: lb://notification-service
#     predicates:
#       - Path=/api/admin/v1/**
#     filters:
#       - name: RequestRateLimiter
#         args:
#           redis-rate-limiter.replenishRate: 20
#           redis-rate-limiter.burstCapacity: 40
#
# The admin panel (mystic-admin) connects directly to notification-service (port 8088)
# during development. In production, route through the gateway.
