server:
  port: 8084

spring:
  application:
    name: ai-orchestrator

  ai:
    openai:
      base-url: https://api.groq.com/openai
      api-key: ${GROQ_API_KEY}
      chat:
        options:
          model: llama-3.3-70b-versatile
          max-tokens: 2048
          temperature: 0.8

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:mystic}
    password: ${RABBITMQ_PASSWORD:mystic123}
    virtual-host: ${RABBITMQ_VHOST:mystic}
    listener:
      simple:
        prefetch: 1
        concurrency: 2
        max-concurrency: 5
        missing-queues-fatal: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:mystic123}
      timeout: 5000ms

# ── AI Provider Fallback Chain ───────────────────────────────────────────────
# Chain for complex tasks (natal chart, dreams, monthly story):
#   Groq llama-3.3-70b → Gemini 1.5 Flash → Groq mixtral-8x7b → Groq llama-3.1-8b
# Chain for simple tasks (SWOT, symbol meaning, sky pulse):
#   Groq llama-3.1-8b  → Gemini 1.5 Flash → Groq mixtral-8x7b
ai:
  groq:
    api-key: ${GROQ_API_KEY}
    base-url: https://api.groq.com/openai/v1
  gemini:
    # Set GEMINI_API_KEY env var to enable Google Gemini fallback (free tier, high RPM)
    api-key: ${GEMINI_API_KEY:}
    base-url: https://generativelanguage.googleapis.com/v1beta
    model: gemini-1.5-flash

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    ip-address: ${EUREKA_INSTANCE_IP:127.0.0.1}
    instance-id: ${spring.application.name}:${random.uuid}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    com.mysticai.orchestrator: DEBUG
    org.springframework.ai: DEBUG
