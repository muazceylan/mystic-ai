server:
  port: 8081

spring:
  application:
    name: auth-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:mystic_auth}
    username: ${DB_USER:mystic}
    password: ${DB_PASSWORD:mystic123}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:mystic123}

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:${RABBITMQ_USER:mystic}}
    password: ${RABBITMQ_PASSWORD:mystic123}
    virtual-host: ${RABBITMQ_VHOST:mystic}
    listener:
      simple:
        default-requeue-rejected: false

  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS:false}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    ip-address: ${EUREKA_INSTANCE_IP:127.0.0.1}
    instance-id: ${spring.application.name}:${random.uuid}

jwt:
  secret: ${JWT_SECRET:bXlzdGljLWFpLXNlY3JldC1rZXktZm9yLWp3dC10b2tlbi1nZW5lcmF0aW9uLW11c3QtYmUtYXQtbGVhc3QtMjU2LWJpdHM=}
  expiration: 3600000
  refresh-expiration: 86400000

auth:
  google:
    allowed-client-ids: ${GOOGLE_ALLOWED_CLIENT_IDS:607073022009-t0nujj22fr6k33tuhdg1eka9n9eq36t5.apps.googleusercontent.com,607073022009-a1r82mu51cetqtsknk5fjf34kau393g9.apps.googleusercontent.com}
  verification:
    token-pepper: ${VERIFICATION_TOKEN_PEPPER:change-me-dev-pepper}
    token-bytes: ${VERIFICATION_TOKEN_BYTES:48}
    token-ttl-hours: ${VERIFICATION_TOKEN_TTL_HOURS:24}
    resend-cooldown-seconds: ${VERIFICATION_RESEND_COOLDOWN_SECONDS:60}
    resend-daily-limit: ${VERIFICATION_RESEND_DAILY_LIMIT:5}
    retry:
      max-attempts: ${VERIFICATION_RETRY_MAX_ATTEMPTS:3}
      delay-seconds: ${VERIFICATION_RETRY_DELAY_SECONDS:30}
  mail:
    from: ${MAIL_FROM:no-reply@mysticai.local}

management:
  endpoints:
    web:
      exposure:
        include: health,info

services:
  astrology:
    base-url: ${ASTROLOGY_SERVICE_URL:http://localhost:8083}
    connect-timeout: ${ASTROLOGY_SERVICE_CONNECT_TIMEOUT:2s}
    read-timeout: ${ASTROLOGY_SERVICE_READ_TIMEOUT:20s}

logging:
  level:
    com.mysticai.auth: DEBUG
