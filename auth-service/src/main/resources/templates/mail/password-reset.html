<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset your password</title>
</head>
<body style="margin:0; padding:0; background:#f3f4f6; font-family:Arial, sans-serif; color:#111827;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="padding:24px 12px;">
    <tr>
      <td align="center">
        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:560px; background:#ffffff; border:1px solid #e5e7eb; border-radius:12px; overflow:hidden;">
          <tr>
            <td style="padding:28px 24px 12px;">
              <h1 style="margin:0; font-size:24px; line-height:1.3; color:#111827;">Reset your password</h1>
            </td>
          </tr>
          <tr>
            <td style="padding:0 24px 18px;">
              <p style="margin:0; line-height:1.6; color:#374151;">
                We received a request to reset your Mystic AI account password.
              </p>
              <p style="margin:12px 0 0; line-height:1.6; color:#374151;">
                This reset link is valid for {{expiresMinutes}} minutes and can be used once.
              </p>
            </td>
          </tr>
          <tr>
            <td style="padding:0 24px 24px;">
              <a href="{{resetLink}}" style="display:inline-block; background:#111827; color:#ffffff; text-decoration:none; padding:12px 18px; border-radius:8px; font-weight:600;">Reset Password</a>
            </td>
          </tr>
          <tr>
            <td style="padding:0 24px 24px;">
              <p style="margin:0; font-size:13px; line-height:1.6; color:#6b7280;">
                If the button does not work, copy this link:
                <br />
                <a href="{{resetLink}}" style="color:#2563eb;">{{resetLink}}</a>
              </p>
            </td>
          </tr>
          <tr>
            <td style="padding:0 24px 24px;">
              <p style="margin:0; font-size:13px; line-height:1.6; color:#6b7280;">
                If you did not request this, you can ignore this email.
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
