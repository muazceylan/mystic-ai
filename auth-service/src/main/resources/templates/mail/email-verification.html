<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>E-postanı Doğrula</title>
</head>
<body style="font-family: Arial, sans-serif; background:#f6f8fb; margin:0; padding:24px; color:#1f2937;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:620px; margin:0 auto; background:#ffffff; border-radius:12px; border:1px solid #e5e7eb;">
    <tr>
      <td style="padding:32px 28px 16px 28px; text-align:center;">
        <div style="display:inline-block; width:64px; height:64px; background:linear-gradient(135deg,#9D4EDD,#C77DFF); border-radius:16px; line-height:64px; font-size:32px; text-align:center;">✨</div>
        <div style="color:#9D4EDD; font-size:20px; font-weight:700; margin-top:10px; letter-spacing:0.3px;">Astro Guru</div>
      </td>
    </tr>
    <tr>
      <td style="padding:0 28px 12px 28px;">
        <h1 style="margin:0; font-size:22px; line-height:1.3; color:#111827;">E-postanı Doğrula</h1>
      </td>
    </tr>
    <tr>
      <td style="padding:0 28px;">
        <p style="margin:0 0 16px 0; font-size:15px; line-height:1.6; color:#374151;">
          Merhaba, Astro Guru hesabını etkinleştirmek için e-posta adresini doğrula.
        </p>
        <p style="margin:0 0 20px 0; font-size:14px; line-height:1.6; color:#4b5563;">
          Bu doğrulama bağlantısı <strong>{{expiresHours}} saat</strong> geçerlidir ve yalnızca bir kez kullanılabilir.
        </p>
      </td>
    </tr>
    <tr>
      <td style="padding:0 28px 8px 28px;">
        <a href="{{verificationLink}}" style="display:inline-block; background:linear-gradient(135deg,#9D4EDD,#C77DFF); color:#ffffff; text-decoration:none; padding:13px 24px; border-radius:8px; font-weight:600; font-size:15px;">E-postayı Doğrula</a>
      </td>
    </tr>
    <tr>
      <td style="padding:8px 28px 24px 28px;">
        <p style="margin:0; font-size:12px; line-height:1.5; color:#6b7280; word-break:break-all;">
          Buton çalışmazsa bu bağlantıyı aç:
          <br />
          <a href="{{verificationLink}}" style="color:#9D4EDD;">{{verificationLink}}</a>
        </p>
      </td>
    </tr>
    <tr>
      <td style="padding:0 28px 24px 28px; border-top:1px solid #f0f0f0;">
        <p style="margin:16px 0 0 0; font-size:11px; color:#bbb; text-align:center;">© Astro Guru</p>
      </td>
    </tr>
  </table>
</body>
</html>
