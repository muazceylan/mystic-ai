<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verify your email</title>
</head>
<body style="font-family: Arial, sans-serif; background:#f6f8fb; margin:0; padding:24px; color:#1f2937;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:620px; margin:0 auto; background:#ffffff; border-radius:12px; border:1px solid #e5e7eb;">
    <tr>
      <td style="padding:28px 28px 12px 28px;">
        <h1 style="margin:0; font-size:24px; line-height:1.3; color:#111827;">Confirm your email</h1>
      </td>
    </tr>
    <tr>
      <td style="padding:0 28px;">
        <p style="margin:0 0 16px 0; font-size:15px; line-height:1.6; color:#374151;">
          Hello, please verify your email to activate your Mystic AI account.
        </p>
        <p style="margin:0 0 20px 0; font-size:14px; line-height:1.6; color:#4b5563;">
          This verification link is valid for {{expiresHours}} hours and can be used once.
        </p>
      </td>
    </tr>
    <tr>
      <td style="padding:0 28px 8px 28px;">
        <a href="{{verificationLink}}" style="display:inline-block; background:#111827; color:#ffffff; text-decoration:none; padding:12px 18px; border-radius:8px; font-weight:600;">Verify Email</a>
      </td>
    </tr>
    <tr>
      <td style="padding:8px 28px 24px 28px;">
        <p style="margin:0; font-size:12px; line-height:1.5; color:#6b7280; word-break:break-all;">
          If the button does not work, open this link:
          <br />
          <a href="{{verificationLink}}" style="color:#2563eb;">{{verificationLink}}</a>
        </p>
      </td>
    </tr>
  </table>
</body>
</html>
