apiVersion: apps/v1
kind: Deployment
metadata:
  name: mobile-web
  namespace: mystic-stage
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mobile-web
  template:
    metadata:
      labels:
        app: mobile-web
    spec:
      containers:
        - name: mobile-web
          image: __REPLACE_IMAGE_MOBILE_WEB__
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 45
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: mobile-web
  namespace: mystic-stage
spec:
  selector:
    app: mobile-web
  ports:
    - name: http
      port: 80
      targetPort: 80
