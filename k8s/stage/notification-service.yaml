apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: mystic-stage
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: __REPLACE_IMAGE_NOTIFICATION_SERVICE__
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8088
          envFrom:
            - configMapRef:
                name: mystic-stage-config
            - secretRef:
                name: mystic-stage-secret
          env:
            - name: DB_NAME
              value: mystic_notification
            - name: SPRING_JPA_HIBERNATE_DDL_AUTO
              value: validate
            - name: ASTROLOGY_SERVICE_URL
              value: http://api-gateway:8080
            - name: NOTIFICATION_TEST_ENDPOINTS_ENABLED
              value: "false"
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8088
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8088
            initialDelaySeconds: 60
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: mystic-stage
spec:
  selector:
    app: notification-service
  ports:
    - name: http
      port: 8088
      targetPort: 8088
