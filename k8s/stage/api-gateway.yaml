apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: mystic-stage
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: __REPLACE_IMAGE_API_GATEWAY__
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: mystic-stage-config
            - secretRef:
                name: mystic-stage-secret
          env:
            - name: GATEWAY_AUTH_PERMIT_ALL
              value: "false"
            - name: MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE
              value: health,info,metrics
          readinessProbe:
            httpGet:
              path: /api/v1/auth/check-email?email=readiness@mystic.ai
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: mystic-stage
spec:
  selector:
    app: api-gateway
  ports:
    - name: http
      port: 8080
      targetPort: 8080
