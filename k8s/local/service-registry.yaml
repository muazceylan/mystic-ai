apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-registry
  namespace: mystic-local
spec:
  replicas: 1
  selector:
    matchLabels:
      app: service-registry
  template:
    metadata:
      labels:
        app: service-registry
    spec:
      containers:
        - name: service-registry
          image: mystic/service-registry:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8761
          readinessProbe:
            tcpSocket:
              port: 8761
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 12
          livenessProbe:
            tcpSocket:
              port: 8761
            initialDelaySeconds: 45
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: service-registry
  namespace: mystic-local
spec:
  selector:
    app: service-registry
  ports:
    - name: http
      port: 8761
      targetPort: 8761

