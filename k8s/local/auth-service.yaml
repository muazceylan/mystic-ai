apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: mystic-local
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: mystic/auth-service:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
          envFrom:
            - configMapRef:
                name: mystic-local-config
            - secretRef:
                name: mystic-local-secret
          env:
            - name: DB_NAME
              value: mystic_auth
            - name: SPRING_JPA_HIBERNATE_DDL_AUTO
              value: validate
            - name: ASTROLOGY_SERVICE_URL
              value: http://api-gateway:8080
          readinessProbe:
            httpGet:
              path: /api/v1/auth/check-email?email=readiness@mystic.ai
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /api/v1/auth/check-email?email=liveness@mystic.ai
              port: 8081
            initialDelaySeconds: 60
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: mystic-local
spec:
  selector:
    app: auth-service
  ports:
    - name: http
      port: 8081
      targetPort: 8081
