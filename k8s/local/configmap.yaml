apiVersion: v1
kind: ConfigMap
metadata:
  name: mystic-local-config
  namespace: mystic-local
data:
  ENV: "stage"
  EUREKA_URL: "http://service-registry:8761/eureka/"
  DB_HOST: "host.docker.internal"
  DB_PORT: "5432"
  DB_USER: "mystic"
  RABBITMQ_HOST: "host.docker.internal"
  RABBITMQ_PORT: "5672"
  RABBITMQ_USER: "mystic"
  RABBITMQ_VHOST: "mystic"
  REDIS_HOST: "host.docker.internal"
  REDIS_PORT: "6379"
  MAIL_HOST: "host.docker.internal"
  MAIL_PORT: "1025"
  MAIL_SMTP_AUTH: "false"
  MAIL_SMTP_STARTTLS: "false"
  MAIL_FROM: "no-reply@mysticai.local"
  API_PUBLIC_URL: "http://app.localhost"
  APP_PUBLIC_URL: "http://app.localhost"
  CORS_ALLOWED_ORIGINS: "http://app.localhost,http://admin.localhost"
  BACKEND_URL: "http://api-gateway:8080"
  AUTH_SERVICE_URL: "http://api-gateway:8080"
  NUMEROLOGY_SERVICE_URL: "http://api-gateway:8080/api/numerology"
  EXPO_PUBLIC_APP_ENV: "stage"
  EXPO_PUBLIC_API_BASE_URL_STAGE: "http://app.localhost"

